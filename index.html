<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ping Meunprasittiveg | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #ffffff !important;
            color: #111111 !important;
            line-height: 1.6;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        header {
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #111111;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .role-badge {
            font-size: 0.95rem;
            font-weight: 400;
            color: #555555;
        }

        /* Minimalist Tabs Navigation */
        .tabs-nav {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid #e5e5e5;
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #777777;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.75rem 0;
            cursor: pointer;
            transition: color 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: #111111;
        }

        .tab-btn.active {
            color: #000000;
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: #000000;
        }

        /* Tab Content Toggle */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        p {
            color: #111111;
            font-size: 1rem;
            margin-bottom: 1.25rem;
            font-weight: 400;
        }

        p strong {
            font-weight: 600;
        }

        /* List Layout for Projects */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .list-item {
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #e5e5e5;
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #111111;
            margin-bottom: 0.5rem;
        }

        .list-item p {
            color: #555555;
            font-size: 0.95rem;
            margin: 0;
        }
