<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paroon TJ Meunprasittiveg | Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #111111;
            --text-muted: #666666;
            --border-color: #e5e5e5;
            --tab-active: #000000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 680px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        header {
            margin-bottom: 2.5rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.25rem;
        }

        .role-badge {
            font-size: 0.95rem;
            font-weight: 400;
            color: var(--text-muted);
        }

        /* Minimalist Tabs Navigation */
        .tabs-nav {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2.5rem;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            padding: 0.75rem 0;
            cursor: pointer;
            transition: color 0.2s ease;
            position: relative;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--tab-active);
            font-weight: 600;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1.5px;
            background-color: var(--tab-active);
        }

        /* Tab Content Toggle */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        p {
            color: var(--text-main);
            font-size: 1rem;
            margin-bottom: 1.25rem;
            font-weight: 400;
        }

        p strong {
            font-weight: 600;
        }

        /* List Layout for Projects & Research */
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .list-item {
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .list-item:last-child {
            border-bottom: none;
        }

        .list-item h3 {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .list-item p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin: 0;
        }

        .meta-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @media (max-width: 600px) {
            body { padding: 2rem 1.25rem; }
            header h1 { font-size: 1.75rem; }
            .tabs-nav { gap: 1.25rem; }
        }
    </style>
</head>
